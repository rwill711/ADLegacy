                addMessage(`${targetUnit.name} was revived with ${targetUnit.hp} HP!`);
              }
            } else if (potion.effect === 'heal_hp') {
              targetUnit.hp = Math.min(targetUnit.maxHp, targetUnit.hp + potion.power);
              addMessage(`${targetUnit.name} restored ${potion.power} HP!`);
            } else if (potion.effect === 'restore_mp') {
              targetUnit.mp = Math.min(targetUnit.maxMp, targetUnit.mp + potion.power);
              addMessage(`${targetUnit.name} restored ${potion.power} MP!`);
            } else if (potion.effect === 'cure_status') {
              targetUnit.effects = [];
              addMessage(`${targetUnit.name} was cured of all status effects!`);
            }

            // Consume the potion (remove from equipment)
            gs.selectedUnit.equipment[potion.potionSlot] = null;
            addMessage(`${gs.selectedUnit.name} used ${potion.name}!`);
          } else {
            // Normal skill usage
            useSkill(gs.selectedUnit, target, gs.selectedSkill);
          }
          gs.selectedUnit.hasActed = true;
          gs.selectedUnit = null;
          gs.skillRange = [];
          gs.moveRange = [];
          setSelectedUnit(null);
          setSelectedSkill(null);
          
          const aliveEnemies = gs.units.filter(u => u.team === 'enemy' && u.hp > 0);
          if (aliveEnemies.length === 0) {
            if (gameMode === 'endless') {
              // Calculate rewards for endless mode
              const defeatedEnemies = gs.units.filter(u => u.team === 'enemy');
              const gilEarned = defeatedEnemies.reduce((sum, enemy) => {
                return sum + (50 * enemy.level * waveNumber);
              }, 0);
              const expEarned = defeatedEnemies.reduce((sum, enemy) => {
                return sum + (30 * enemy.level);
              }, 0);

              // Award potions based on wave number
              const potionsEarned = [];
              // Always get healing potions
              potionsEarned.push('healingPotion', 'healingPotion');
              // Get mana potions
              potionsEarned.push('manaPotion');
              // Every 3rd wave, get an elixir
              if (waveNumber % 3 === 0) {
                potionsEarned.push('elixir');
              }
              // Every 5th wave, get a life potion
              if (waveNumber % 5 === 0) {
                potionsEarned.push('lifePotion');
              }

              setWaveRewards({ gil: gilEarned, exp: expEarned, potions: potionsEarned });
              setGil(prev => prev + gilEarned);

              // Give EXP to all surviving player units
              gs.units.filter(u => u.team === 'player' && u.hp > 0).forEach(unit => {
                unit.exp += expEarned;
              });

              setGamePhase('rewards');
            } else {
              setGamePhase('victory');
            }
            return;
          }
          
          setTimeout(nextTurn, 1000);
        }
      }
      return;
    }
    
    if (gs.selectedUnit && gs.selectedUnit.x === gridX && gs.selectedUnit.y === gridY) {
      gs.selectedUnit = null;
      gs.moveRange = [];
      gs.skillRange = [];
      setSelectedUnit(null);
      setSelectedSkill(null);
      addMessage('Unit deselected.');
      return;
    }
    
    if (!gs.selectedUnit) {
      const unit = gs.units.find(u => u.x === gridX && u.y === gridY && u === currentUnit && u.hp > 0);
      if (unit) {
        if (unit.effects.includes('sleep')) {
          addMessage(`${unit.name} is asleep and cannot act!`);
          return;
        }
        gs.selectedUnit = unit;
        gs.moveRange = unit.hasMoved ? [] : calculateMoveRange(unit);
        setSelectedUnit(unit);
        addMessage(`${unit.name} selected. ${!unit.hasActed ? 'You can use skills.' : ''} ${!unit.hasMoved ? 'You can move.' : ''}`);
      }
      return;
    }

    if (!gs.selectedUnit.hasMoved && gs.moveRange.find(tile => tile.x === gridX && tile.y === gridY)) {
      gs.selectedUnit.previousX = gs.selectedUnit.x;
      gs.selectedUnit.previousY = gs.selectedUnit.y;
      gs.selectedUnit.previousFacing = gs.selectedUnit.facing;

      // Update facing direction based on movement
      const dx = gridX - gs.selectedUnit.x;
      const dy = gridY - gs.selectedUnit.y;
      if (Math.abs(dx) > Math.abs(dy)) {
        // Horizontal movement dominates
        gs.selectedUnit.facing = dx > 0 ? 'E' : 'W';
      } else if (dy !== 0) {
        // Vertical movement
        gs.selectedUnit.facing = dy > 0 ? 'S' : 'N';
      }
      // If dx and dy are both 0, facing doesn't change

      gs.selectedUnit.x = gridX;
      gs.selectedUnit.y = gridY;
      gs.selectedUnit.hasMoved = true;
      gs.moveRange = [];
      // Moving reveals hidden units
      if (gs.selectedUnit.effects.includes('hidden')) {
        gs.selectedUnit.effects = gs.selectedUnit.effects.filter(e => e !== 'hidden');
        addMessage(`${gs.selectedUnit.name} is no longer hidden!`);
      }
      addMessage('Move complete. Choose a skill or end turn. You can undo your move if needed.');

      // Check if unit is adjacent to an interactable object (chest)
      const adjacentChest = gs.objects.find(obj =>
        obj.type.startsWith('chest_') &&
        !obj.opened &&
        Math.abs(obj.x - gridX) <= 1 &&
        Math.abs(obj.y - gridY) <= 1 &&
        (obj.x !== gridX || obj.y !== gridY) // Not on same tile
      );

      if (adjacentChest) {
        addMessage(`${gs.selectedUnit.name} found a treasure chest! Click near it again to open it.`);
      }

      return;
    }

    // Check if clicking on adjacent chest to open it
    if (gs.selectedUnit) {
      const clickedChest = gs.objects.find(obj =>
        obj.type.startsWith('chest_') &&
        !obj.opened &&
        obj.x === gridX &&
        obj.y === gridY
      );

      if (clickedChest) {
        // Check if unit is adjacent
        const isAdjacent = Math.abs(clickedChest.x - gs.selectedUnit.x) <= 1 &&
                          Math.abs(clickedChest.y - gs.selectedUnit.y) <= 1;

        if (isAdjacent) {
          openChest(clickedChest, gs.selectedUnit);
          return;
        } else {
          addMessage(`${gs.selectedUnit.name} must be adjacent to the chest to open it!`);
          return;
        }
      }
    }
  };

  const handleSkillClick = (skill) => {
    const gs = gameState.current;
    if (!gs.selectedUnit || gs.selectedUnit.mp < skill.mpCost || gs.selectedUnit.hasActed) return;
    
    gs.selectedSkill = skill;
    gs.skillRange = calculateSkillRange(gs.selectedUnit, skill);
    gs.moveRange = [];
    setSelectedSkill(skill);
    addMessage(`Select a target for ${skill.name}`);
  };

  // Open a treasure chest
  const openChest = (chest, unit) => {
    chest.opened = true;
    const objData = objectData[chest.type];

    // Calculate gold reward (scaled by wave number)
    const baseGold = Math.floor(Math.random() * (objData.maxGold - objData.minGold + 1)) + objData.minGold;
    const waveMultiplier = gameMode === 'endless' ? waveNumber : 1;
    const goldAmount = baseGold * waveMultiplier;
    setGil(prev => prev + goldAmount);

    addMessage(`${unit.name} opened a ${objData.name} and found ${goldAmount} gil!`);

    // Check for item drop based on chest rarity
    const allEquip = getAllEquipment();
    const roll = Math.random() * 100;

    if (roll < objData.itemChance) {
      // Determine what type of item to drop based on chest rarity
      const itemRoll = Math.random() * 100;

      // Common chests: mostly potions, occasionally equipment
      if (chest.type === 'chest_common') {
        if (itemRoll < 70) {
          // 70% chance for potion
          const potions = ['healingPotion', 'manaPotion', 'elixir'];
          const potionKey = potions[Math.floor(Math.random() * potions.length)];
          // Add potion to first empty slot
          if (!unit.equipment.potion1) unit.equipment.potion1 = potionKey;
          else if (!unit.equipment.potion2) unit.equipment.potion2 = potionKey;
          else if (!unit.equipment.potion3) unit.equipment.potion3 = potionKey;
          else addMessage(`...but ${unit.name}'s potion slots are full!`);
          addMessage(`...and found a ${allEquip[potionKey].name}!`);
        } else {
          addMessage(`...and found a common item!`);
        }
      }
      // Rare chests: weapons and armor
      else if (chest.type === 'chest_rare') {
        addMessage(`...and found rare equipment! (Equipment drops coming soon)`);
      }
      // Epic chests: better equipment and life potions
      else if (chest.type === 'chest_epic') {
        if (itemRoll < 30) {
          // 30% chance for life potion
          if (!unit.equipment.potion1) unit.equipment.potion1 = 'lifePotion';
          else if (!unit.equipment.potion2) unit.equipment.potion2 = 'lifePotion';
          else if (!unit.equipment.potion3) unit.equipment.potion3 = 'lifePotion';
          else addMessage(`...but ${unit.name}'s potion slots are full!`);
          addMessage(`...and found a Life Potion!`);
        } else {
          addMessage(`...and found epic equipment! (Equipment drops coming soon)`);
        }
      }
      // Legendary chests: best items
      else if (chest.type === 'chest_legendary') {
        addMessage(`...and found legendary equipment! (Equipment drops coming soon)`);
      }
    }
  };

  // Damage an object (wall)
  const damageObject = (obj, damage, attacker) => {
    if (!obj.destructible) {
      addMessage(`The ${objectData[obj.type].name} cannot be destroyed!`);
      return false;
    }

    obj.hp -= damage;
    addMessage(`${attacker.name} attacks the ${objectData[obj.type].name} for ${damage} damage!`);

    if (obj.hp <= 0) {
      // Remove destroyed object
      const index = gameState.current.objects.indexOf(obj);
      if (index > -1) {
        gameState.current.objects.splice(index, 1);
        addMessage(`The ${objectData[obj.type].name} has been destroyed!`);

        // If it was a wood wall, maybe start a fire
        if (obj.type === 'wall_wood' && Math.random() < 0.3) {
          gameState.current.terrain[obj.y][obj.x] = 'fire';
          addMessage(`The destroyed wooden wall catches fire!`);
        }
      }
      return true;
    }

    return false;
  };

  // Volcano eruption - spawns lava around the volcano
  const eruptVolcano = (volcano) => {
    addMessage(`🌋 The volcano erupts! Lava flows across the battlefield!`);

    const terrain = gameState.current.terrain;
    const spawnCount = volcano.lavaSpawnCount;
    let spawned = 0;

    // Spawn lava near the volcano base first
    const adjacentTiles = [];
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue; // Skip volcano itself
        const nx = volcano.x + dx;
        const ny = volcano.y + dy;
        if (nx >= 0 && nx < 15 && ny >= 0 && ny < 15) {
          adjacentTiles.push({ x: nx, y: ny });
        }
      }
    }

    // Place lava on adjacent tiles first
    adjacentTiles.forEach(tile => {
      if (spawned >= spawnCount) return;
      const currentTile = terrain[tile.y][tile.x];
      // Can place lava on passable terrain
      if (currentTile === 'grass' || currentTile === 'burntGround' || currentTile === 'fire') {
        terrain[tile.y][tile.x] = 'lava';
        terrainStateRef.current[`${tile.x},${tile.y}`] = { type: 'lava', duration: 2 };
        spawned++;
      }
    });

    // Spawn remaining lava randomly on the map
    while (spawned < spawnCount) {
      const x = Math.floor(Math.random() * 15);
      const y = Math.floor(Math.random() * 15);
      const currentTile = terrain[y][x];

      if (currentTile === 'grass' || currentTile === 'burntGround') {
        terrain[y][x] = 'lava';
        terrainStateRef.current[`${x},${y}`] = { type: 'lava', duration: 2 };
        spawned++;
      }
    }

    addMessage(`${spawned} lava pools appear! They will cool down in 2 turns.`);
  };

  const undoMove = () => {
    const gs = gameState.current;
    if (!gs.selectedUnit || !gs.selectedUnit.hasMoved || gs.selectedUnit.hasActed) return;
    if (gs.selectedUnit.previousX === null || gs.selectedUnit.previousY === null) return;
    
    gs.selectedUnit.x = gs.selectedUnit.previousX;
    gs.selectedUnit.y = gs.selectedUnit.previousY;
    if (gs.selectedUnit.previousFacing) {
      gs.selectedUnit.facing = gs.selectedUnit.previousFacing;
    }
    gs.selectedUnit.hasMoved = false;
    gs.selectedUnit.previousX = null;
    gs.selectedUnit.previousY = null;
    gs.selectedUnit.previousFacing = null;
    gs.moveRange = calculateMoveRange(gs.selectedUnit);
    addMessage(`Move undone. ${gs.selectedUnit.name} can move again.`);
  };

  useEffect(() => {
    // Don't render canvas during setup phase
    if (gamePhase === 'setup') return;
    if (!canvasRef.current) return;

    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');

    const render = () => {
      ctx.clearRect(0, 0, 850, 850);
      
      const gs = gameState.current;
      const terrain = gs.terrain;
      
      // Draw grid labels (files A-O on top and bottom)
      ctx.fillStyle = '#AAA';
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      const files = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L', 'M', 'N', 'O'];
      for (let x = 0; x < 15; x++) {
        ctx.fillText(files[x], 75 + x * 50, 40); // Top
        ctx.fillText(files[x], 75 + x * 50, 825); // Bottom
      }
      
      // Draw grid labels (ranks 1-15, with 1 at bottom from player perspective)
      for (let y = 0; y < 15; y++) {
        const rank = 15 - y; // 15 at top (y=0), 1 at bottom (y=14)
        ctx.fillText(rank.toString(), 25, 80 + y * 50); // Left
        ctx.fillText(rank.toString(), 825, 80 + y * 50); // Right
      }
      
      // Draw tiles with terrain
      for (let y = 0; y < 15; y++) {
        for (let x = 0; x < 15; x++) {
          const px = 50 + x * 50;
          const py = 50 + y * 50;

          // Get elevation for this tile
          const elevation = gs.elevation && gs.elevation[y] ? (gs.elevation[y][x] || 0) : 0;

          // Base grass color - lighter for higher elevations
          let baseColor1, baseColor2;
          switch (elevation) {
            case 0: // Ground level
              baseColor1 = '#3A5F3A';
              baseColor2 = '#2F4F2F';
              break;
            case 1: // Low platform
              baseColor1 = '#4A6F4A';
              baseColor2 = '#3F5F3F';
              break;
            case 2: // Medium platform
              baseColor1 = '#5A7F5A';
              baseColor2 = '#4F6F4F';
              break;
            case 3: // High platform
              baseColor1 = '#6A8F6A';
              baseColor2 = '#5F7F5F';
              break;
            default:
              baseColor1 = '#3A5F3A';
              baseColor2 = '#2F4F2F';
          }
          ctx.fillStyle = (x + y) % 2 === 0 ? baseColor1 : baseColor2;
          ctx.fillRect(px, py, 50, 50);

          // Draw elevation indicator in corner if elevated
          if (elevation > 0) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`+${elevation}`, px + 2, py + 10);
          }

          // Draw terrain overlay
          const tileTerrain = terrain[y] ? terrain[y][x] : 'grass';
          if (tileTerrain !== 'grass') {
            const tData = terrainData[tileTerrain];
            
            if (tileTerrain === 'water') {
              ctx.fillStyle = 'rgba(65, 105, 225, 0.5)';
              ctx.fillRect(px, py, 50, 50);
              ctx.fillStyle = 'rgba(100, 149, 237, 0.7)';
              ctx.font = '20px Arial';
              ctx.textAlign = 'center';
              ctx.fillText('~', px + 25, py + 35);
            } else if (tileTerrain === 'deepWater') {
              ctx.fillStyle = 'rgba(0, 0, 139, 0.7)';
              ctx.fillRect(px, py, 50, 50);
              ctx.fillStyle = 'rgba(30, 60, 180, 0.9)';
              ctx.font = '20px Arial';
              ctx.textAlign = 'center';
              ctx.fillText('≈', px + 25, py + 35);
            } else if (tileTerrain === 'tree') {
              // Draw tree as a simple graphic instead of emoji for reliability
              // Tree trunk
              ctx.fillStyle = '#8B4513';
              ctx.fillRect(px + 20, py + 30, 10, 15);
              // Tree foliage (triangle)
              ctx.fillStyle = '#228B22';
              ctx.beginPath();
              ctx.moveTo(px + 25, py + 5);
              ctx.lineTo(px + 10, py + 32);
              ctx.lineTo(px + 40, py + 32);
              ctx.closePath();
              ctx.fill();
              // Darker outline
              ctx.strokeStyle = '#006400';
              ctx.lineWidth = 1;
              ctx.stroke();
            } else if (tileTerrain === 'burningTree') {
              // Burning tree trunk
              ctx.fillStyle = '#4a2000';
              ctx.fillRect(px + 20, py + 30, 10, 15);
              // Burning foliage
              ctx.fillStyle = '#FF4500';
              ctx.beginPath();
              ctx.moveTo(px + 25, py + 5);
              ctx.lineTo(px + 10, py + 32);
              ctx.lineTo(px + 40, py + 32);
              ctx.closePath();
              ctx.fill();
              // Fire glow
              ctx.fillStyle = 'rgba(255, 200, 0, 0.5)';
              ctx.beginPath();
              ctx.arc(px + 25, py + 20, 18, 0, Math.PI * 2);
              ctx.fill();
              // Flame symbols
              ctx.font = '14px Arial';
              ctx.fillText('🔥', px + 15, py + 25);
              ctx.fillText('🔥', px + 30, py + 20);
            } else if (tileTerrain === 'rock') {
              ctx.fillStyle = '#696969';
              ctx.beginPath();
              ctx.ellipse(px + 25, py + 30, 18, 14, 0, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = '#808080';
              ctx.beginPath();
              ctx.ellipse(px + 25, py + 28, 14, 10, 0, 0, Math.PI * 2);
              ctx.fill();
            } else if (tileTerrain === 'fire') {
              // Fire base glow
              ctx.fillStyle = 'rgba(255, 100, 0, 0.4)';
              ctx.fillRect(px, py, 50, 50);
              // Animated-looking flames
              ctx.font = '24px Arial';
              ctx.textAlign = 'center';
              ctx.fillText('🔥', px + 25, py + 35);
            } else if (tileTerrain === 'lava') {
              // Lava pool
              ctx.fillStyle = '#FF2400';
              ctx.fillRect(px + 5, py + 5, 40, 40);
              ctx.fillStyle = '#FF6600';
              ctx.beginPath();
              ctx.ellipse(px + 25, py + 25, 15, 12, 0, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = '#FFCC00';
              ctx.beginPath();
              ctx.ellipse(px + 25, py + 25, 8, 6, 0, 0, Math.PI * 2);
              ctx.fill();
            } else if (tileTerrain === 'volcano') {
              // Volcano mountain
              ctx.fillStyle = '#4a3728';
              ctx.beginPath();
              ctx.moveTo(px + 25, py + 5);
              ctx.lineTo(px + 5, py + 45);
              ctx.lineTo(px + 45, py + 45);
              ctx.closePath();
              ctx.fill();
              // Crater
              ctx.fillStyle = '#8B0000';
              ctx.beginPath();
              ctx.ellipse(px + 25, py + 12, 8, 5, 0, 0, Math.PI * 2);
              ctx.fill();
              // Glow
              ctx.fillStyle = '#FF4500';
              ctx.beginPath();
              ctx.ellipse(px + 25, py + 12, 5, 3, 0, 0, Math.PI * 2);
              ctx.fill();
            } else if (tileTerrain === 'burntGround') {
              ctx.fillStyle = 'rgba(47, 47, 47, 0.7)';
              ctx.fillRect(px, py, 50, 50);
              // Ash marks
              ctx.fillStyle = '#1a1a1a';
              ctx.fillRect(px + 10, py + 15, 8, 3);
              ctx.fillRect(px + 30, py + 25, 10, 3);
              ctx.fillRect(px + 18, py + 35, 6, 3);
            }
          }
          
          ctx.strokeStyle = '#1a2a1a';
          ctx.lineWidth = 1;
          ctx.strokeRect(px, py, 50, 50);
        }
      }

      gs.moveRange.forEach(tile => {
        ctx.fillStyle = 'rgba(100, 150, 255, 0.3)';
        ctx.fillRect(50 + tile.x * 50, 50 + tile.y * 50, 50, 50);
      });

      gs.skillRange.forEach(tile => {
        ctx.fillStyle = 'rgba(255, 100, 100, 0.4)';
        ctx.fillRect(50 + tile.x * 50, 50 + tile.y * 50, 50, 50);
      });

      // Draw defeated unit bodies
      gs.defeatedUnits.forEach(body => {
        const px = 50 + body.x * 50 + 25;
        const py = 50 + body.y * 50 + 25;
        
        // Draw body as a fallen figure (darker, rotated)
        ctx.globalAlpha = 0.6;
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(px, py + 10, 18, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Body (horizontal/fallen)
        ctx.fillStyle = body.unit.team === 'player' ? '#4a4a8a' : '#8a4a4a';
        ctx.fillRect(px - 18, py - 5, 36, 14);
        
        // Head
        ctx.fillStyle = body.unit.team === 'player' ? '#8B8B00' : '#4B0000';
        ctx.beginPath();
        ctx.arc(px - 14, py, 6, 0, Math.PI * 2);
        ctx.fill();
        
        // X eyes to show defeated
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px - 16, py - 2);
        ctx.lineTo(px - 12, py + 2);
        ctx.moveTo(px - 12, py - 2);
        ctx.lineTo(px - 16, py + 2);
        ctx.stroke();
        
        // Turns remaining indicator
        ctx.globalAlpha = 1.0;
        ctx.fillStyle = '#FFF';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        const turnsText = `${body.turnsRemaining}`;
        ctx.strokeText(turnsText, px + 15, py - 10);
        ctx.fillText(turnsText, px + 15, py - 10);
        
        ctx.globalAlpha = 1.0;
      });

      // Draw interactive objects (chests, walls, volcanos)
      gs.objects.forEach(obj => {
        const objData = objectData[obj.type];
        if (!objData) return;

        const px = 50 + obj.x * 50;
        const py = 50 + obj.y * 50;

        if (obj.type.startsWith('chest_')) {
          // Draw chest
          ctx.fillStyle = objData.color;
          ctx.fillRect(px + 10, py + 20, 30, 20);
          // Lid
          ctx.fillStyle = obj.opened ? '#654321' : objData.color;
          ctx.fillRect(px + 8, py + 18, 34, 8);
          // Lock
          if (!obj.opened) {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(px + 25, py + 30, 3, 0, Math.PI * 2);
            ctx.fill();
          }
          // Rarity glow
          if (!obj.opened && obj.type !== 'chest_common') {
            ctx.strokeStyle = objData.color;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 300) * 0.2;
            ctx.strokeRect(px + 8, py + 18, 34, 22);
            ctx.globalAlpha = 1.0;
          }
        } else if (obj.type === 'volcano') {
          // Volcano (similar to terrain volcano but as object)
          ctx.fillStyle = '#4a3728';
          ctx.beginPath();
          ctx.moveTo(px + 25, py + 5);
          ctx.lineTo(px + 5, py + 45);
          ctx.lineTo(px + 45, py + 45);
          ctx.closePath();
          ctx.fill();
          // Crater
          ctx.fillStyle = '#8B0000';
          ctx.beginPath();
          ctx.ellipse(px + 25, py + 12, 8, 5, 0, 0, Math.PI * 2);
          ctx.fill();
          // Glow (pulsing for active volcano)
          const glowIntensity = 0.5 + Math.sin(Date.now() / 500) * 0.5;
          ctx.fillStyle = `rgba(255, 69, 0, ${glowIntensity})`;
          ctx.beginPath();
          ctx.ellipse(px + 25, py + 12, 5, 3, 0, 0, Math.PI * 2);
          ctx.fill();
        } else if (obj.type.startsWith('wall_')) {
          // Draw wall
          const isWood = obj.type === 'wall_wood';
          ctx.fillStyle = isWood ? '#8B4513' : '#696969';
          ctx.fillRect(px + 5, py + 5, 40, 40);
          // Texture/damage
          const healthPercent = obj.hp / obj.maxHp;
          if (healthPercent < 1) {
            // Show cracks/damage
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(px + 15, py + 10);
            ctx.lineTo(px + 25, py + 25);
            ctx.lineTo(px + 20, py + 40);
            ctx.stroke();
          }
          if (isWood) {
            // Wood grain
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 1;
            for (let i = 0; i < 3; i++) {
              ctx.beginPath();
              ctx.moveTo(px + 10, py + 15 + i * 10);
              ctx.lineTo(px + 40, py + 15 + i * 10);
              ctx.stroke();
            }
          }
          // HP bar if damaged
          if (healthPercent < 1 && healthPercent > 0) {
            ctx.fillStyle = '#000';
            ctx.fillRect(px + 8, py + 2, 34, 4);
            ctx.fillStyle = healthPercent > 0.5 ? '#0F0' : healthPercent > 0.25 ? '#FF0' : '#F00';
            ctx.fillRect(px + 8, py + 2, 34 * healthPercent, 4);
          }
        }
      });

      gs.units.filter(u => u.hp > 0).forEach(unit => {
        const px = 50 + unit.x * 50 + 25;
        const py = 50 + unit.y * 50 + 15;
        
        // Hidden units are semi-transparent (only visible to their own team)
        const isHidden = unit.effects.includes('hidden');
        if (isHidden) {
          ctx.globalAlpha = 0.5;
        }
        
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(px, py + 25, 15, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = jobData[unit.job].color;
        ctx.fillRect(px - 12, py, 24, 30);
        
        ctx.fillStyle = unit.team === 'player' ? '#FFD700' : '#8B0000';
        ctx.beginPath();
        ctx.arc(px, py - 5, 8, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.strokeRect(px - 12, py, 24, 30);

        // Draw facing indicator (small triangle/arrow)
        if (unit.facing) {
          ctx.fillStyle = unit.team === 'player' ? '#FFFFFF' : '#FFFF00';
          ctx.beginPath();
          const arrowSize = 6;
          switch (unit.facing) {
            case 'N': // Pointing up
              ctx.moveTo(px, py - 2);
              ctx.lineTo(px - arrowSize, py + arrowSize);
              ctx.lineTo(px + arrowSize, py + arrowSize);
              break;
            case 'S': // Pointing down
              ctx.moveTo(px, py + 32);
              ctx.lineTo(px - arrowSize, py + 32 - arrowSize);
              ctx.lineTo(px + arrowSize, py + 32 - arrowSize);
              break;
            case 'E': // Pointing right
              ctx.moveTo(px + 14, py + 15);
              ctx.lineTo(px + 14 - arrowSize, py + 15 - arrowSize);
              ctx.lineTo(px + 14 - arrowSize, py + 15 + arrowSize);
              break;
            case 'W': // Pointing left
              ctx.moveTo(px - 14, py + 15);
              ctx.lineTo(px - 14 + arrowSize, py + 15 - arrowSize);
              ctx.lineTo(px - 14 + arrowSize, py + 15 + arrowSize);
              break;
          }
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        const hpPercent = unit.hp / unit.maxHp;
        ctx.fillStyle = '#000';
        ctx.fillRect(px - 15, py - 15, 30, 5);
        const barColor = unit.team === 'enemy' ? 
          (hpPercent > 0.5 ? '#F00' : hpPercent > 0.25 ? '#C00' : '#800') :
          (hpPercent > 0.5 ? '#0F0' : hpPercent > 0.25 ? '#FF0' : '#F00');
        ctx.fillStyle = barColor;
        ctx.fillRect(px - 15, py - 15, 30 * hpPercent, 5);
        
        if (unit.effects.length > 0) {
          ctx.font = 'bold 12px Arial';
          ctx.fillStyle = '#FFF';
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 2;
          let effectY = py + 42;
          unit.effects.forEach(effect => {
            const symbol = effect === 'poison' ? 'â˜ ' : effect === 'slow' ? 'ðŸŒ' : effect === 'sleep' ? 'ðŸ’¤' : effect === 'hidden' ? 'ðŸ‘' : 'âš¡';
            ctx.strokeText(symbol, px - 5, effectY);
            ctx.fillText(symbol, px - 5, effectY);
            effectY += 12;
          });
        }
        
        // Job initials on body
        ctx.fillStyle = '#FFF';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.font = 'bold 9px Arial';
        ctx.textAlign = 'center';
        const jobInitials = {
          'knight': 'K',
          'rogue': 'R',
          'archer': 'A',
          'whiteMage': 'WM',
          'darkMage': 'DM',
          'paladin': 'P',
          'darkKnight': 'DK',
          'warrior': 'W',
          'dragoon': 'Dr',
          'thief': 'T',
          'assassin': 'As',
          'ninja': 'N',
          'sniper': 'Sn',
          'ranger': 'Rg',
          'blackMage': 'BM',
          'timeMage': 'TM'
        };
        const initials = jobInitials[unit.job] || '?';
        ctx.strokeText(initials, px, py + 15);
        ctx.fillText(initials, px, py + 15);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`Lv${unit.level}`, px, py + 45);

        // Reset alpha
        ctx.globalAlpha = 1.0;
      });

      if (gs.selectedUnit) {
        const px = 50 + gs.selectedUnit.x * 50;
        const py = 50 + gs.selectedUnit.y * 50;
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.strokeRect(px, py, 50, 50);
      }

      const currentUnit = turnOrder[currentTurnIndex];
      if (currentUnit) {
        const px = 50 + currentUnit.x * 50;
        const py = 50 + currentUnit.y * 50;
        ctx.strokeStyle = '#00FFFF';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(px, py, 50, 50);
        ctx.setLineDash([]);
      }
    };

    const interval = setInterval(render, 50);
    return () => clearInterval(interval);
  }, [turnOrder, currentTurnIndex, gamePhase]);

  // Show team selection screen during setup
  if (gamePhase === 'setup') {
    return <TeamSelectionScreen onStartGame={handleStartGame} />;
  }

  return (
    <div className="flex gap-4 p-4 bg-gray-900 min-h-screen">
      <div className="flex flex-col items-center">
        <h1 className="text-3xl font-bold text-white mb-1">Tactical RPG</h1>
        <div className="text-xs text-gray-500 mb-1">Alpha 1.01</div>
        <div className="text-yellow-400 mb-2">Turn {turnNumber}</div>
        <canvas 
          ref={canvasRef} 
          width={850} 
          height={850}
          onClick={handleCanvasClick}
          onContextMenu={(e) => e.preventDefault()}
          className="border-4 border-gray-700 rounded cursor-pointer bg-gray-800"
        />
        <div className="mt-2 text-white text-center">{message}</div>
        <div 
          ref={logRef}
          className="mt-2 w-full max-w-3xl h-32 overflow-y-auto bg-gray-800 border border-gray-700 rounded p-2"
        >
          {messageLog.map((msg, idx) => (
            <div key={idx} className={`text-sm ${msg.isEnemy ? 'text-red-400' : 'text-green-400'}`}>
              <span className="text-yellow-500">[T{msg.turn}]</span> {msg.text}
            </div>
          ))}
        </div>
        <div className="mt-1 text-gray-400 text-sm text-center">Shift+Click or Right-Click any unit to inspect</div>
        {gamePhase === 'player' && selectedUnit && (
          <div className="flex gap-2">
            <button 
              onClick={nextTurn}
              className="mt-2 px-6 py-2 bg-red-600 text-white rounded hover:bg-red-700"
            >
              End Turn
            </button>
            {selectedUnit.hasMoved && !selectedUnit.hasActed && (
              <button 
                onClick={undoMove}
                className="mt-2 px-6 py-2 bg-yellow-600 text-white rounded hover:bg-yellow-700"
              >
                Undo Move
              </button>
            )}
          </div>
        )}

        {/* Debug Panel - Always available during gameplay */}
        {gamePhase !== 'setup' && gamePhase !== 'rewards' && gamePhase !== 'victory' && gamePhase !== 'defeat' && gamePhase !== 'levelup' && gamePhase !== 'shop' && gamePhase !== 'equip' && (
          <div className="mt-4 w-full max-w-3xl">
            <button
              onClick={() => setShowDebugPanel(!showDebugPanel)}
              className="w-full px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600 text-sm"
            >
              {showDebugPanel ? '▼ Hide Debug Panel' : '▶ Show Debug Panel'}
            </button>

            {showDebugPanel && (
              <div className="mt-2 p-4 bg-gray-800 border-2 border-yellow-500 rounded">
                <div className="text-yellow-400 font-bold mb-2">DEBUG CONTROLS</div>

                <div className="space-y-1 text-sm text-white mb-3">
                  <div>Game Phase: <span className="text-cyan-400">{gamePhase}</span></div>
                  <div>Turn Index: <span className="text-cyan-400">{currentTurnIndex} / {turnOrder.length - 1}</span></div>
                  <div>Current Unit: <span className="text-cyan-400">
                    {turnOrder[currentTurnIndex]
                      ? `${turnOrder[currentTurnIndex].name} (${turnOrder[currentTurnIndex].team})`
                      : 'None'}
                  </span></div>
                  <div>AI Processing: <span className={aiProcessingRef.current ? 'text-red-400' : 'text-green-400'}>
                    {aiProcessingRef.current ? 'LOCKED' : 'FREE'}
                  </span></div>
                </div>

                <div className="space-y-2">
                  <button
                    onClick={forceEndTurn}
                    className="w-full px-4 py-2 bg-red-700 text-white rounded hover:bg-red-600 font-bold"
                  >
                    ⚠ Force End Turn
                  </button>
                  <button
                    onClick={resetAILock}
                    className="w-full px-4 py-2 bg-orange-700 text-white rounded hover:bg-orange-600 font-bold"
                  >
                    🔓 Reset AI Lock
                  </button>
                </div>

                <div className="mt-3 text-xs text-gray-400">
                  Use these controls if the turn gets stuck or AI won't finish its turn.
                </div>
              </div>
            )}
          </div>
        )}

        {gamePhase === 'rewards' && (
          <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50">
            <div className="p-8 bg-purple-900 border-4 border-purple-500 rounded-lg shadow-2xl max-w-md w-full">
              <div className="text-center mb-4">
                <div className="text-3xl font-bold text-yellow-400 mb-2">Wave {waveNumber} Complete!</div>
                <div className="text-xl text-purple-100 mb-4">
                  <div>Gil Earned: <span className="text-yellow-400 font-bold">+{waveRewards.gil}</span></div>
                  <div>EXP Earned: <span className="text-green-400 font-bold">+{waveRewards.exp}</span></div>
                  {waveRewards.potions && waveRewards.potions.length > 0 && (
                    <div className="mt-2 text-sm">
                      <div className="text-purple-300 font-bold">Potions Earned:</div>
                      <div className="text-purple-200">
                        {(() => {
                          const allEquip = getAllEquipment();
                          const potionCounts = {};
                          waveRewards.potions.forEach(p => {
                            potionCounts[p] = (potionCounts[p] || 0) + 1;
                          });
                          return Object.entries(potionCounts).map(([key, count]) => (
                            <div key={key}>• {count}x {allEquip[key]?.name}</div>
                          ));
                        })()}
                      </div>
                    </div>
                  )}
                </div>
                <div className="text-lg text-purple-200 mb-4">
                  <div>Total Gil: <span className="text-yellow-300 font-bold">{gil}</span></div>
                  <div>Current Wave: <span className="text-cyan-300 font-bold">{waveNumber}</span></div>
                </div>
              </div>

            <div className="space-y-3">
              <button
                onClick={() => setGamePhase('levelup')}
                className="w-full px-6 py-3 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 transition-colors">
                Level Up Units
              </button>
              <button
                onClick={() => setGamePhase('shop')}
                className="w-full px-6 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors">
                Visit Shop (Gil: {gil})
              </button>
              <button
                onClick={() => {
                  const nextWave = waveNumber + 1;
                  setWaveNumber(nextWave);
                  continueToNextWave(nextWave);
                }}
                className="w-full px-6 py-3 bg-purple-600 text-white rounded-lg font-bold hover:bg-purple-700 transition-colors">
                Continue to Wave {waveNumber + 1}
              </button>
              <button
                onClick={() => window.location.reload()}
                className="w-full px-6 py-3 bg-gray-600 text-white rounded-lg font-bold hover:bg-gray-700 transition-colors">
                End Run
              </button>
            </div>
            </div>
          </div>
        )}
        {gamePhase === 'levelup' && (
          <div className="mt-4 p-6 bg-green-900 border-2 border-green-500 rounded-lg max-h-96 overflow-y-auto">
            <div className="text-center mb-4">
              <div className="text-2xl font-bold text-green-300 mb-2">Level Up Units</div>
              <div className="text-sm text-green-200">Cost: Level × 100 EXP</div>
            </div>

            {gameState.current.units.filter(u => u.team === 'player' && u.hp > 0).map(unit => {
              const expNeeded = unit.level * 100;
              const canLevelUp = unit.exp >= expNeeded && unit.level < 10;

              return (
                <div key={unit.id} className="mb-4 p-4 bg-gray-800 rounded-lg border-2" style={{ borderColor: jobData[unit.job]?.color || '#666' }}>
                  <div className="flex justify-between items-start mb-2">
                    <div>
                      <div className="text-lg font-bold text-white">{unit.name}</div>
                      <div className="text-sm text-gray-300">
                        {unit.job.charAt(0).toUpperCase() + unit.job.slice(1)} - Level {unit.level}
                      </div>
                      <div className="text-sm text-gray-400">
                        EXP: {unit.exp}/{expNeeded} {unit.level >= 10 && '(MAX)'}
                      </div>
                    </div>
                    <button
                      onClick={() => {
                        if (canLevelUp) {
                          unit.exp -= expNeeded;
                          unit.level += 1;
                          recalculateUnitStats(unit);
                          unit.hp = unit.maxHp;
                          unit.mp = unit.maxMp;
                          setMessage(`${unit.name} leveled up to ${unit.level}!`);
                          // Force re-render
                          setGamePhase('levelup');
                        }
                      }}
                      disabled={!canLevelUp}
                      className={`px-4 py-2 rounded font-bold transition-colors ${
                        canLevelUp
                          ? 'bg-green-600 text-white hover:bg-green-700'
                          : 'bg-gray-600 text-gray-400 cursor-not-allowed'
                      }`}>
                      {unit.level >= 10 ? 'MAX' : canLevelUp ? 'Level Up!' : 'Need EXP'}
                    </button>
                  </div>

                  <div className="grid grid-cols-3 gap-2 text-xs text-gray-300">
                    <div>HP: {unit.maxHp}</div>
                    <div>MP: {unit.maxMp}</div>
                    <div>ATK: {unit.atk}</div>
                    <div>DEF: {unit.def}</div>
                    <div>MAG: {unit.mag}</div>
                    <div>SPD: {unit.spd}</div>
                  </div>

                  {unit.level < 10 && (
                    <div className="mt-3 pt-3 border-t border-gray-700">
                      <div className="text-xs font-bold text-green-400 mb-1">Next Level Gains:</div>
                      <div className="grid grid-cols-3 gap-2 text-xs text-green-300">
                        {jobData[unit.job].statGrowth.hp > 0 && <div>HP +{jobData[unit.job].statGrowth.hp}</div>}
                        {jobData[unit.job].statGrowth.mp > 0 && <div>MP +{jobData[unit.job].statGrowth.mp}</div>}
                        {jobData[unit.job].statGrowth.atk > 0 && <div>ATK +{jobData[unit.job].statGrowth.atk}</div>}
                        {jobData[unit.job].statGrowth.def > 0 && <div>DEF +{jobData[unit.job].statGrowth.def}</div>}
                        {jobData[unit.job].statGrowth.mag > 0 && <div>MAG +{jobData[unit.job].statGrowth.mag}</div>}
                        {jobData[unit.job].statGrowth.spd > 0 && <div>SPD +{jobData[unit.job].statGrowth.spd}</div>}
                      </div>
                      {(() => {
                        const nextSkills = jobData[unit.job].skills.filter(s => s.level === unit.level + 1);
                        return nextSkills.length > 0 && (
                          <div className="mt-2">
                            <div className="text-xs font-bold text-yellow-400">Unlocks:</div>
                            {nextSkills.map(skill => (
                              <div key={skill.name} className="text-xs text-yellow-300">• {skill.name}</div>
                            ))}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              );
            })}

            <button
              onClick={() => setGamePhase('rewards')}
              className="w-full mt-4 px-6 py-3 bg-gray-600 text-white rounded-lg font-bold hover:bg-gray-700 transition-colors">
              Back to Rewards
            </button>
          </div>
        )}
        {gamePhase === 'shop' && (
          <div className="mt-4 p-6 bg-blue-900 border-2 border-blue-500 rounded-lg max-h-96 overflow-y-auto">
            <div className="text-center mb-4">
              <div className="text-2xl font-bold text-blue-300 mb-2">Equipment Shop</div>
              <div className="text-lg text-yellow-300">Gil: {gil}</div>
            </div>

            {Object.entries(equipmentData).map(([categoryName, category]) => (
              <div key={categoryName} className="mb-6">
                <h3 className="text-xl font-bold text-blue-200 mb-3 capitalize">{categoryName}</h3>
                <div className="grid gap-2">
                  {Object.entries(category).map(([itemKey, item]) => {

            {gameState.current.units.map((unit, idx) => (
              <div key={idx} className={unit.hp <= 0 ? 'text-red-400' : ''}>
                {unit.name} [{unit.x},{unit.y}] {unit.team} L{unit.level} - HP:{unit.hp}/{unit.maxHp} MP:{unit.mp}/{unit.maxMp} - {unit.hasMoved ? 'M' : '-'}{unit.hasActed ? 'A' : '-'}
              </div>
            ))}

            {selectedUnit && (
              <>
                <div className="text-yellow-400 font-bold mt-3">Selected Unit:</div>
                <div>{selectedUnit.name} ({selectedUnit.job})</div>
                <div>Position: [{selectedUnit.x}, {selectedUnit.y}]</div>
                <div>Stats: ATK:{selectedUnit.atk} DEF:{selectedUnit.def} MAG:{selectedUnit.mag} SPD:{selectedUnit.spd}</div>
                <div>Status: {selectedUnit.hasMoved ? 'Moved' : 'Can Move'} | {selectedUnit.hasActed ? 'Acted' : 'Can Act'}</div>
                {selectedUnit.effects.length > 0 && <div>Effects: {selectedUnit.effects.join(', ')}</div>}
              </>
            )}

            {inspectedUnit && (
              <>
                <div className="text-yellow-400 font-bold mt-3">Inspected Unit:</div>
                <div>{inspectedUnit.name} ({inspectedUnit.job})</div>
                <div>Position: [{inspectedUnit.x}, {inspectedUnit.y}]</div>
                <div>HP: {inspectedUnit.hp}/{inspectedUnit.maxHp}</div>
              </>
            )}

            <div className="text-yellow-400 font-bold mt-3">Refs:</div>
            <div>AI Processing: {aiProcessingRef.current ? 'true' : 'false'}</div>
            <div>Current Turn Index Ref: {currentTurnIndexRef.current}</div>

            <div className="text-gray-400 mt-3 pt-2 border-t border-green-500">
              Press 'D' to toggle debug mode
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// No export needed for browser - component will be used directly

  </script>

  <!-- Render the component -->
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TacticalRPG />);
  </script>
</body>
</html>
